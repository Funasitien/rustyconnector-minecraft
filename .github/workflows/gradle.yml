name: Build RC
on:
  push:
    branches:
      # matches every branch
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Execute Gradle build
        run: gradle build :paper:build :velocity:build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RustyConnector
          path: |
            ${{ github.workspace }}/paper/build/libs/*
            ${{ github.workspace }}/velocity/build/libs/*
